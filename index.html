<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite + React + TS</title>
    <script type="module" crossorigin src="/assets/index-CWhQvqN-.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-CvrjwR3K.css">
    <style>
      /* Dark mode toggle button */
      #theme-toggle-btn {
        position: fixed;
        top: 12px;
        right: 16px;
        z-index: 9999;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 14px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
        font-family: ui-sans-serif, system-ui, sans-serif;
        transition: background-color 0.3s, color 0.3s, border-color 0.3s;
        background-color: #f3f4f6;
        color: #374151;
      }
      #theme-toggle-btn:hover {
        background-color: #e5e7eb;
      }
      #theme-toggle-btn svg {
        width: 18px;
        height: 18px;
      }

      /* Dark mode toggle styling when dark */
      html.dark #theme-toggle-btn {
        background-color: #374151;
        color: #f9fafb;
        border-color: #4b5563;
      }
      html.dark #theme-toggle-btn:hover {
        background-color: #4b5563;
      }

      /* ===== DARK MODE OVERRIDES ===== */

      /* Main backgrounds */
      html.dark .bg-gray-50 {
        background-color: #111827 !important;
      }
      html.dark .bg-white {
        background-color: #1f2937 !important;
      }
      html.dark .bg-gray-100 {
        background-color: #1f2937 !important;
      }
      html.dark .bg-gray-200 {
        background-color: #374151 !important;
      }
      html.dark .bg-gray-800 {
        background-color: #0f172a !important;
      }
      html.dark .bg-black {
        background-color: #000000 !important;
      }

      /* Text colors */
      html.dark .text-gray-900 {
        color: #f9fafb !important;
      }
      html.dark .text-gray-800 {
        color: #f3f4f6 !important;
      }
      html.dark .text-gray-700 {
        color: #e5e7eb !important;
      }
      html.dark .text-gray-600 {
        color: #d1d5db !important;
      }
      html.dark .text-gray-500 {
        color: #9ca3af !important;
      }

      /* Border colors */
      html.dark .border-gray-300 {
        border-color: #4b5563 !important;
      }
      html.dark .border-gray-200,
      html.dark .hover\:border-gray-200:hover {
        border-color: #374151 !important;
      }
      html.dark .border-b {
        border-color: #374151 !important;
      }
      html.dark .border-t {
        border-color: #374151 !important;
      }
      html.dark .divide-y > :not([hidden]) ~ :not([hidden]) {
        border-color: #374151 !important;
      }

      /* Hover backgrounds */
      html.dark .hover\:bg-gray-100:hover {
        background-color: #374151 !important;
      }
      html.dark .hover\:bg-gray-50:hover {
        background-color: #283548 !important;
      }
      html.dark .hover\:bg-gray-300:hover {
        background-color: #4b5563 !important;
      }
      html.dark .hover\:bg-red-50:hover {
        background-color: #451a1a !important;
      }

      /* Colored backgrounds - slightly dimmed for dark mode */
      html.dark .bg-blue-50 {
        background-color: #1e2a4a !important;
      }
      html.dark .bg-blue-100 {
        background-color: #1e3a5f !important;
      }
      html.dark .bg-green-100 {
        background-color: #14462a !important;
      }
      html.dark .bg-purple-100 {
        background-color: #2d1b4e !important;
      }
      html.dark .bg-red-50 {
        background-color: #3b1515 !important;
      }
      html.dark .bg-red-100 {
        background-color: #451a1a !important;
      }
      html.dark .bg-yellow-100 {
        background-color: #3b3510 !important;
      }

      /* Colored text - brighten slightly for dark backgrounds */
      html.dark .text-blue-600 {
        color: #60a5fa !important;
      }
      html.dark .text-blue-800 {
        color: #93c5fd !important;
      }
      html.dark .text-green-600 {
        color: #4ade80 !important;
      }
      html.dark .text-green-800 {
        color: #86efac !important;
      }
      html.dark .text-purple-600 {
        color: #c084fc !important;
      }
      html.dark .text-purple-800 {
        color: #d8b4fe !important;
      }
      html.dark .text-red-600 {
        color: #f87171 !important;
      }
      html.dark .text-red-800 {
        color: #fca5a5 !important;
      }
      html.dark .text-yellow-800 {
        color: #fde68a !important;
      }
      html.dark .text-white {
        color: #ffffff !important;
      }

      /* Hover text */
      html.dark .hover\:text-blue-500:hover {
        color: #93c5fd !important;
      }
      html.dark .hover\:text-blue-700:hover {
        color: #60a5fa !important;
      }

      /* Colored borders */
      html.dark .border-blue-200 {
        border-color: #1e3a5f !important;
      }
      html.dark .border-blue-600 {
        border-color: #3b82f6 !important;
      }
      html.dark .border-green-200 {
        border-color: #14462a !important;
      }
      html.dark .border-purple-200 {
        border-color: #2d1b4e !important;
      }
      html.dark .border-red-200 {
        border-color: #451a1a !important;
      }
      html.dark .border-white {
        border-color: #374151 !important;
      }

      /* Shadows - darker for dark mode */
      html.dark .shadow-sm {
        box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.3) !important;
      }
      html.dark .shadow-md {
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.4), 0 2px 4px -2px rgb(0 0 0 / 0.3) !important;
      }
      html.dark .shadow-lg {
        box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.4), 0 4px 6px -4px rgb(0 0 0 / 0.3) !important;
      }
      html.dark .shadow-xl {
        box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.4), 0 8px 10px -6px rgb(0 0 0 / 0.3) !important;
      }

      /* Form inputs */
      html.dark input,
      html.dark select,
      html.dark textarea {
        background-color: #1f2937 !important;
        color: #f3f4f6 !important;
        border-color: #4b5563 !important;
      }
      html.dark input::placeholder,
      html.dark textarea::placeholder {
        color: #6b7280 !important;
      }
      html.dark input:focus,
      html.dark select:focus,
      html.dark textarea:focus {
        border-color: #3b82f6 !important;
      }

      /* Modal overlay */
      html.dark .bg-opacity-50 {
        --tw-bg-opacity: 0.7 !important;
      }

      /* Scrollbar for dark mode */
      html.dark ::-webkit-scrollbar {
        width: 8px;
      }
      html.dark ::-webkit-scrollbar-track {
        background: #1f2937;
      }
      html.dark ::-webkit-scrollbar-thumb {
        background: #4b5563;
        border-radius: 4px;
      }

      /* Body transition */
      body {
        transition: background-color 0.3s ease;
      }
    </style>
    <script>
      // Apply saved theme immediately to prevent flash
      (function() {
        var theme = localStorage.getItem('theme');
        if (theme === 'dark') {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function() {
        var sunIcon = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>';
        var moonIcon = '<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';

        function isDark() {
          return document.documentElement.classList.contains('dark');
        }

        function updateButton(btn) {
          if (isDark()) {
            btn.innerHTML = sunIcon + '<span>Light Mode</span>';
            btn.title = 'Switch to Light Mode';
          } else {
            btn.innerHTML = moonIcon + '<span>Dark Mode</span>';
            btn.title = 'Switch to Dark Mode';
          }
        }

        function createToggle() {
          if (document.getElementById('theme-toggle-btn')) return;

          var btn = document.createElement('button');
          btn.id = 'theme-toggle-btn';
          btn.type = 'button';
          updateButton(btn);

          btn.addEventListener('click', function() {
            document.documentElement.classList.toggle('dark');
            var currentTheme = isDark() ? 'dark' : 'light';
            localStorage.setItem('theme', currentTheme);
            updateButton(btn);
          });

          document.body.appendChild(btn);
        }

        // Create toggle once DOM is ready
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', createToggle);
        } else {
          createToggle();
        }

        // Re-inject if React removes the button during re-renders
        var observer = new MutationObserver(function() {
          if (!document.getElementById('theme-toggle-btn')) {
            createToggle();
          }
        });
        observer.observe(document.body, { childList: true, subtree: true });
      })();
    </script>
  </body>
</html>
